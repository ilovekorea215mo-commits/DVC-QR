<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVC - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* Remove animated background blobs - not needed for white background */

        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: scale(0.9);
            }
            to { 
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Remove Vitruvian Man background - clean white look */

        .splash-container {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .logo-container {
            padding: 0;
            margin: 0;
        }

        .logo-container img {
            max-width: 320px;
            width: 80%;
            height: auto;
            animation: fadeIn 1.2s ease-out;
        }

        @media (max-width: 600px) {
            .logo-container img {
                max-width: 240px;
                width: 70%;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-container">
            <img src="images/logo.png" alt="DVC Logo">
        </div>
    </div>

    <script>
        // Auto redirect to language selection after 3 seconds
        setTimeout(() => {
            window.location.href = 'page2-language-selection.html';
        }, 3000);
    </script>
</body>
</html>
