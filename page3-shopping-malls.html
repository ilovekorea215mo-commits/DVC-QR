<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVC - Shopping Malls</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 30%, #2d2410 60%, #3d3010 100%);
            position: relative;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Animated background */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 20s infinite ease-in-out;
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: rgba(218, 165, 32, 0.15);
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: rgba(255, 215, 0, 0.1);
            bottom: -100px;
            left: -100px;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d4af37;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        .language-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(212, 175, 55, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            font-size: 14px;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-title {
            color: #d4af37;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Shopping Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .mall-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .mall-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3);
        }

        .card-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(197, 160, 40, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #d4af37;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .card-link:hover {
            gap: 12px;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header {
                flex-wrap: wrap;
                gap: 10px;
            }

            .header-title {
                font-size: 18px;
            }

            .page-title {
                font-size: 26px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading animation */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="page2-language-selection.html" class="back-btn">
            ← <span id="backText">Back</span>
        </a>
        <h1 class="header-title">DVC</h1>
        <div class="language-indicator">
            <span id="languageFlag">🇺🇸</span>
            <span id="languageName">English</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h2 class="page-title" id="pageTitle">Shopping Malls</h2>
        <p class="page-subtitle" id="pageSubtitle">Select your preferred shopping destination</p>

        <!-- Shopping Cards -->
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards will be dynamically loaded based on language -->
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p class="footer-text" id="footerText">© 2024 DVC. All rights reserved.</p>
    </div>

    <script>
        // Shopping mall data for different languages
        const mallData = {

                backText: "Back",
                footerText: "© 2024 DVC. All rights reserved.",
                malls: [
                    {
                        icon: "🏬",

                    },
                    {
                        icon: "🛍️",
                        title: "Fashion Plaza",
                        description: "Latest fashion trends and boutique collections",
                        link: "#fashion-plaza"
                    },
                    {
                        icon: "🏢",

                        description: "Entertainment, shopping, and family activities",
                        link: "#city-center"
                    },
                    {

                    {

                    {

                ]
            },
            zh: {
                pageTitle: "购物中心",
                pageSubtitle: "选择您喜欢的购物目的地",

                footerText: "© 2024 DVC. 版权所有。",
                malls: [
                    {
                        icon: "🏬",

                        description: "豪华品牌和餐饮的优质购物体验",
                        link: "#downtown-mall-zh"
                    },
                    {
                        icon: "🛍️",
                        title: "时尚广场",
                        description: "最新时尚潮流和精品系列",
                        link: "#fashion-plaza-zh"
                    },
                    {
                        icon: "🏢",
                        title: "城市中心",
                        description: "娱乐、购物和家庭活动",
                        link: "#city-center-zh"
                    }
                ]
            },
            ru: {
                pageTitle: "Торговые центры",
                pageSubtitle: "Выберите предпочитаемое место для покупок",
                backText: "Назад",
                footerText: "© 2024 DVC. Все права защищены.",
                malls: [
                    {
                        icon: "🏬",
                        title: "Центральный торговый центр",
                        description: "Премиум покупки с люксовыми брендами",
                        link: "#downtown-mall-ru"
                    },
                    {
                        icon: "🛍️",
                        title: "Модная площадь",
                        description: "Последние модные тренды и бутики",
                        link: "#fashion-plaza-ru"
                    }
                ]
            },
            si: {
                pageTitle: "සාප්පු සංකීර්ණ",
                pageSubtitle: "ඔබගේ කැමති සාප්පු ගමනාන්තය තෝරන්න",
                backText: "ආපසු",
                footerText: "© 2024 DVC. සියලුම හිමිකම් ඇවිරිණි.",
                malls: [
                    {
                        icon: "🏬",
                        title: "නගර මධ්‍ය සාප්පු සංකීර්ණය",
                        description: "සුඛෝපභෝගී වෙළඳ නාම සහ ආහාර සමග ප්‍රිමියම් සාප්පු අත්දැකීම",
                        link: "#downtown-mall-si"
                    },
                    {
                        icon: "🛍️",
                        title: "විලාසිතා ප්ලාසා",
                        description: "නවතම විලාසිතා ප්‍රවණතා සහ බුටික් එකතුව",
                        link: "#fashion-plaza-si"
                    }
                ]
            },
            ja: {
                pageTitle: "ショッピングモール",
                pageSubtitle: "お好みのショッピング先を選択",
                backText: "戻る",
                footerText: "© 2024 DVC. 全著作権所有。",
                malls: [
                    {
                        icon: "🏬",
                        title: "ダウンタウンモール",
                        description: "高級ブランドとダイニングのプレミアムショッピング",
                        link: "#downtown-mall-ja"
                    },
                    {
                        icon: "🛍️",
                        title: "ファッションプラザ",
                        description: "最新のファッショントレンドとブティック",
                        link: "#fashion-plaza-ja"
                    }
                ]
            }
            // Add more languages as needed: uz, mn, vi, th, kk, my, ne, km, id, tl
        };

        // Get selected language from localStorage
        const selectedLang = localStorage.getItem('selectedLanguage') || 'en';
        const selectedLangName = localStorage.getItem('selectedLanguageName') || 'English';

        // Load content based on language
        function loadContent() {
            const data = mallData[selectedLang] || mallData['en'];
            
            // Update page text
            document.getElementById('pageTitle').textContent = data.pageTitle;
            document.getElementById('pageSubtitle').textContent = data.pageSubtitle;
            document.getElementById('backText').textContent = data.backText;
            document.getElementById('footerText').textContent = data.footerText;
            document.getElementById('languageName').textContent = selectedLangName;

            // Load mall cards
            const cardsGrid = document.getElementById('cardsGrid');
            cardsGrid.innerHTML = '';

            data.malls.forEach((mall, index) => {
                const card = document.createElement('a');
                card.href = mall.link;
                card.className = 'mall-card fade-in';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="card-image">${mall.icon}</div>
                    <div class="card-content">
                        <h3 class="card-title">${mall.title}</h3>
                        <p class="card-description">${mall.description}</p>
                        <span class="card-link">
                            ${data.backText === 'Back' ? 'Visit Now' : 'පිවිසෙන්න'} →
                        </span>
                    </div>
                `;
                
                cardsGrid.appendChild(card);
            });
        }

        // Load content on page load
        loadContent();
    </script>
</body>
</html>
