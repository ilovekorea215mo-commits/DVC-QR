<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVC Shopping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/page3-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* Dark overlay for better contrast */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 600px;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Plate - 75% height - ULTRA TRANSPARENT FOR PALM SHADOWS */
        .glass-plate {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* Welcome Text Animation */
        .welcome-text {
            font-size: 28px;
            font-weight: 500;
            color: #f3f3f3;
            text-align: center;
            opacity: 0;
            transform: scale(1);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 3px;
        }

        /* Slow Fade In/Out Animation */
        @keyframes welcomeFadeIn {
            0% {
                opacity: 0;
            }
            25% {
                opacity: 0.7;
            }
            75% {
                opacity: 0.7;
            }
            100% {
                opacity: 0;
            }
        }

        .welcome-text.animate {
            animation: welcomeFadeIn 4s ease forwards;
        }

        /* Animated Buttons in Glass Plate */
        .buttons-container {
            display: none;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            justify-content: center;
            width: 100%;
            opacity: 0;
        }

        .buttons-container.show {
            display: flex;
            animation: buttonsAppear 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes buttonsAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated-btn {
            position: relative;
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid #fefefe;
            text-transform: uppercase;
            color: #fefefe;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            background-color: transparent;
            cursor: pointer;
            font-family: 'Noto Sans', sans-serif;
            transition: all 0.3s ease;
            min-width: 220px;
            text-align: center;
        }

        .animated-btn::before {
            content: '';
            position: absolute;
            top: 6px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% - 12px);
            background-color: rgba(0, 0, 0, 0.95);
            transition: 0.3s ease-in-out;
            transform: scaleY(1);
        }

        .animated-btn:hover::before {
            transform: scaleY(0);
        }

        .animated-btn::after {
            content: '';
            position: absolute;
            left: 6px;
            top: -2px;
            height: calc(100% + 4px);
            width: calc(100% - 12px);
            background-color: rgba(0, 0, 0, 0.95);
            transition: 0.3s ease-in-out;
            transform: scaleX(1);
            transition-delay: 0.3s;
        }

        .animated-btn:hover::after {
            transform: scaleX(0);
        }

        .animated-btn span {
            position: relative;
            z-index: 3;
        }

        .animated-btn:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Back Button - Small, at page top left corner */
        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 100;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        /* Brand Text with Shine Animation */
        .brand-text {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }

        .brand-name {
            padding: 8px 24px;
            color: #fff;
            background: linear-gradient(to right, #9f9f9f 0, #fff 10%, #868686 20%);
            background-position: 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            animation-fill-mode: forwards;
            -webkit-text-size-adjust: none;
            font-weight: 600;
            font-size: 12px;
            text-decoration: none;
            white-space: nowrap;
            font-family: 'Noto Sans', 'Poppins', sans-serif;
            display: block;
            margin-bottom: 2px;
        }

        .brand-tagline {
            color: #fff;
            background: linear-gradient(to right, #9f9f9f 0, #fff 10%, #868686 20%);
            background-position: 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            animation-fill-mode: forwards;
            -webkit-text-size-adjust: none;
            font-size: 8px;
            font-weight: 400;
            font-family: 'Noto Sans', sans-serif;
            letter-spacing: 1px;
        }

        @keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        @-webkit-keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        @-moz-keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        @-o-keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                height: 80vh;
            }

            .glass-plate {
                padding: 30px 20px;
            }

            .welcome-text {
                font-size: 20px;
            }

            .back-button {
                width: 35px;
                height: 35px;
                font-size: 18px;
                top: 12px;
                left: 12px;
            }

            .brand-text {
                bottom: 10px;
            }

            .brand-name {
                font-size: 10px;
                padding: 6px 16px;
            }

            .brand-tagline {
                font-size: 7px;
            }

            .animated-btn {
                font-size: 14px;
                padding: 12px 30px;
                min-width: 180px;
            }

            .buttons-container {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button (outside container, at page top left) -->
    <a href="page2-language-selection.html" class="back-button">←</a>

    <div class="container">
        <div class="glass-plate">
            <!-- Welcome Text (shows first, then fades out) -->
            <div class="welcome-text" id="welcomeText"></div>

            <!-- Animated Buttons (show after welcome fades) -->
            <div class="buttons-container" id="buttonsContainer">
                <a href="#" class="animated-btn" id="howToUseBtn">
                    <span>How to use</span>
                </a>
                <a href="#" class="animated-btn" id="shoppingMallBtn">
                    <span>Shopping mall</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Brand Text at Bottom -->
    <div class="brand-text">
        <div class="brand-name">Blossom K Beauty</div>
        <div class="brand-tagline">From Korea</div>
    </div>

    <script>
        // Welcome messages by language
        const welcomeMessages = {
            en: 'WELCOME',
            zh: '欢迎',
            ru: 'ДОБРО ПОЖАЛОВАТЬ',
            uz: 'XUШ KELIBSIZ',
            si: 'ආයුබෝවන්',
            mn: 'ТӨВ ХҮРЭХ',
            vi: 'CHÀO MỪNG',
            th: 'ยินดีต้อนรับ',
            kk: 'ҚОШ КЕЛДІҢІЗ',
            my: 'ကြိုဆိုပါတယ်',
            ne: 'स्वागत छ',
            ja: 'ようこそ',
            ko: '안녕하세요',
            km: 'សូមស្វាគមន៍',
            id: 'SELAMAT DATANG',
            tl: 'MALIGAYANG PAGDATING'
        };

        // Get selected language
        const selectedLang = localStorage.getItem('selectedLanguage') || 'en';

        // Show welcome animation
        function showWelcomeAnimation() {
            const welcomeText = document.getElementById('welcomeText');
            const buttonsContainer = document.getElementById('buttonsContainer');
            
            // Set welcome message based on selected language
            welcomeText.textContent = welcomeMessages[selectedLang] || 'WELCOME';
            
            // Start animation after 1 second
            setTimeout(() => {
                welcomeText.classList.add('animate');
            }, 1000);

            // Show buttons after welcome animation completes (5s total: 1s delay + 4s animation)
            setTimeout(() => {
                buttonsContainer.classList.add('show');
            }, 5000);
        }

        // Initialize page
        window.addEventListener('load', () => {
            showWelcomeAnimation();
        });
    </script>
</body>
</html>
