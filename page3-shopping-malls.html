<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVC Shopping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/page3-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* Dark overlay for better contrast */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 600px;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Plate - 75% height - ULTRA TRANSPARENT FOR PALM SHADOWS */
        .glass-plate {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* Welcome Text Animation */
        .welcome-text {
            font-size: 28px;
            font-weight: 500;
            color: #808080;
            text-align: center;
            opacity: 0;
            transform: scale(1);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 3px;
        }

        /* Slow Fade In/Out Animation */
        @keyframes welcomeFadeIn {
            0% {
                opacity: 0;
            }
            25% {
                opacity: 0.7;
            }
            75% {
                opacity: 0.7;
            }
            100% {
                opacity: 0;
            }
        }

        .welcome-text.animate {
            animation: welcomeFadeIn 4s ease forwards;
        }

        /* Back Button - Small, at page top left corner */
        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 100;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                height: 80vh;
            }

            .glass-plate {
                padding: 30px 20px;
            }

            .welcome-text {
                font-size: 20px;
            }

            .back-button {
                width: 35px;
                height: 35px;
                font-size: 18px;
                top: 12px;
                left: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button (outside container, at page top left) -->
    <a href="page2-language-selection.html" class="back-button">←</a>

    <div class="container">
        <div class="glass-plate">
            <!-- Welcome Text (shows first, then fades out, page stays blank) -->
            <div class="welcome-text" id="welcomeText"></div>
        </div>
    </div>

    <script>
        // Welcome messages by language
        const welcomeMessages = {
            en: 'WELCOME',
            zh: '欢迎',
            ru: 'ДОБРО ПОЖАЛОВАТЬ',
            uz: 'XUШ KELIBSIZ',
            si: 'ආයුබෝවන්',
            mn: 'ТӨВ ХҮРЭХ',
            vi: 'CHÀO MỪNG',
            th: 'ยินดีต้อนรับ',
            kk: 'ҚОШ КЕЛДІҢІЗ',
            my: 'ကြိုဆိုပါတယ်',
            ne: 'स्वागत छ',
            ja: 'ようこそ',
            ko: '안녕하세요',
            km: 'សូមស្វាគមន៍',
            id: 'SELAMAT DATANG',
            tl: 'MALIGAYANG PAGDATING'
        };

        // Get selected language
        const selectedLang = localStorage.getItem('selectedLanguage') || 'en';

        // Show welcome animation
        function showWelcomeAnimation() {
            const welcomeText = document.getElementById('welcomeText');
            
            // Set welcome message based on selected language
            welcomeText.textContent = welcomeMessages[selectedLang] || 'WELCOME';
            
            // Start animation after 1 second
            setTimeout(() => {
                welcomeText.classList.add('animate');
            }, 1000);
        }

        // Initialize page
        window.addEventListener('load', () => {
            showWelcomeAnimation();
        });
    </script>
</body>
</html>
