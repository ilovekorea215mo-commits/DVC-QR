<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVC Shopping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/page3-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* Dark overlay for better contrast */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 600px;
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Plate - YOUR CUSTOM SETTINGS: blur(10px) saturate(100%) */
        .glass-plate {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px) saturate(100%);
            -webkit-backdrop-filter: blur(10px) saturate(100%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* Welcome Text Animation */
        .welcome-text {
            font-size: 28px;
            font-weight: 500;
            color: #999999;
            text-align: center;
            opacity: 0;
            transform: scale(1);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 3px;
        }

        /* Slow Fade In/Out Animation */
        @keyframes welcomeFadeIn {
            0% {
                opacity: 0;
            }
            25% {
                opacity: 0.9;
            }
            75% {
                opacity: 0.9;
            }
            100% {
                opacity: 0;
            }
        }

        .welcome-text.animate {
            animation: welcomeFadeIn 4s ease forwards;
        }

        /* Animated Buttons in Glass Plate */
        .buttons-container {
            display: none;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            justify-content: center;
            width: 100%;
            opacity: 0;
        }

        .buttons-container.show {
            display: flex;
            animation: buttonsAppear 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes buttonsAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated-btn {
            position: relative;
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid #fefefe;
            text-transform: uppercase;
            color: #fefefe;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            background-color: transparent;
            cursor: pointer;
            font-family: 'Noto Sans', sans-serif;
            transition: all 0.3s ease;
            min-width: 220px;
            text-align: center;
        }

        .animated-btn::before {
            content: '';
            position: absolute;
            top: 6px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% - 12px);
            background-color: rgba(0, 0, 0, 0.95);
            transition: 0.3s ease-in-out;
            transform: scaleY(1);
        }

        .animated-btn:hover::before {
            transform: scaleY(0);
        }

        .animated-btn::after {
            content: '';
            position: absolute;
            left: 6px;
            top: -2px;
            height: calc(100% + 4px);
            width: calc(100% - 12px);
            background-color: rgba(0, 0, 0, 0.95);
            transition: 0.3s ease-in-out;
            transform: scaleX(1);
            transition-delay: 0.3s;
        }

        .animated-btn:hover::after {
            transform: scaleX(0);
        }

        .animated-btn span {
            position: relative;
            z-index: 3;
        }

        .animated-btn:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Video Popup Player - TRANSPARENT BACKGROUND */
        .video-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .video-popup.active {
            display: flex;
            animation: popupFadeIn 0.3s ease;
        }

        @keyframes popupFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Glass Store Popup */
        .store-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .store-popup.active {
            display: flex;
            animation: popupFadeIn 0.3s ease;
        }

        /* Glass Container for Store Selection */
        .store-glass-container {
            position: relative;
            width: 90%;
            max-width: 520px;
            min-height: 320px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 60px 40px 40px 40px;
            display: flex;
            flex-direction: column;
            gap: 0;
            align-items: center;
            overflow: hidden;
        }

        /* Logo Section - Full Background */
        .store-logo-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .store-logo-section img {
            width: 240px;
            height: auto;
            filter: brightness(0) invert(1);
        }

        /* Buttons Section - On Top of Logo */
        .store-buttons-section {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: stretch;
        }

        /* Close Button for Store Popup */
        .store-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .store-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg) scale(1.1);
        }

        /* Title for Store Selection */
        .store-title {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.5px;
        }

        /* Normal Store Buttons in Glass Popup */
        .store-btn {
            width: 100%;
            padding: 18px 35px;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 15px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .store-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .store-btn:active {
            transform: translateY(-1px);
        }

        /* Mobile Responsive for Store Popup */
        @media (max-width: 600px) {
            .store-glass-container {
                width: 92%;
                max-width: none;
                min-height: 300px;
                padding: 50px 30px 35px 30px;
            }

            .store-logo-section {
                padding-left: 10px;
                opacity: 0.08;
            }

            .store-logo-section img {
                width: 180px;
            }

            .store-buttons-section {
                max-width: 100%;
                gap: 16px;
            }

            .store-title {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .store-btn {
                padding: 16px 28px;
                font-size: 15px;
            }

            .store-close-btn {
                width: 35px;
                height: 35px;
                font-size: 20px;
                top: 12px;
                right: 12px;
            }
        }

        /* Secondary Buttons Container (appears after shopping mall click) */
        .secondary-buttons {
            display: none;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            justify-content: center;
            width: 100%;
            opacity: 0;
        }

        .secondary-buttons.show {
            display: flex;
            animation: buttonsAppear 0.8s ease forwards;
        }

        /* Gooey Marquee Button Wrapper */
        .marquee-btn {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 70px;
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background-color: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .marquee-btn:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        /* Gooey Marquee Text */
        .marquee_text {
            position: absolute;
            min-width: 100%;
            white-space: nowrap;
            color: #fefefe;
            font-weight: 600;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: marqueeScroll 16s infinite linear;
        }

        @keyframes marqueeScroll {
            from { 
                transform: translateX(70%); 
            }
            to { 
                transform: translateX(-70%); 
            }
        }

        /* Blur Layer with Gooey Effect */
        .marquee_blur {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background-color: black;
            background-image:
                linear-gradient(to right, black, 1rem, transparent 50%),
                linear-gradient(to left, black, 1rem, transparent 50%);
            filter: contrast(15);
            pointer-events: none;
        }

        .marquee_blur .marquee_text {
            filter: blur(0.07em);
        }

        /* Clear Layer on Top */
        .marquee_clear {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            pointer-events: none;
        }

        /* Mobile responsive for gooey marquee */
        @media (max-width: 600px) {
            .marquee-btn {
                max-width: 280px;
                height: 60px;
            }

            .marquee_text {
                font-size: 15px;
                letter-spacing: 1.5px;
            }
        }

        /* UPDATED: Smaller video container */
        .video-container {
            position: relative;
            width: 85%;
            max-width: 450px;
            max-height: 75vh;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* UPDATED: Smaller close button */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg) scale(1.1);
        }

        /* UPDATED: Rounded corners wrapper */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border-radius: 20px;
            overflow: hidden;
        }

        /* UPDATED: Rounded corners video */
        .video-wrapper video {
            width: 100%;
            height: auto;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 20px;
        }

        /* Mobile - UPDATED: Smaller with rounded corners */
        @media (max-width: 600px) {
            .video-container {
                width: 90%;
                max-width: 100%;
                max-height: 80vh;
            }

            .video-wrapper video {
                width: 100%;
                height: auto;
                max-height: 80vh;
                border-radius: 15px;
            }

            .close-btn {
                width: 35px;
                height: 35px;
                top: 8px;
                right: 8px;
                font-size: 20px;
            }
        }

        /* Back Button - Small, at page top left corner */
        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 100;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        /* Brand Text with Shine Animation */
        .brand-text {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }

        .brand-name {
            padding: 8px 24px;
            color: #fff;
            background: linear-gradient(to right, #9f9f9f 0, #fff 10%, #868686 20%);
            background-position: 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            animation-fill-mode: forwards;
            -webkit-text-size-adjust: none;
            font-weight: 600;
            font-size: 12px;
            text-decoration: none;
            white-space: nowrap;
            font-family: 'Noto Sans', 'Poppins', sans-serif;
            display: block;
            margin-bottom: 2px;
        }

        .brand-tagline {
            color: #fff;
            background: linear-gradient(to right, #9f9f9f 0, #fff 10%, #868686 20%);
            background-position: 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            animation-fill-mode: forwards;
            -webkit-text-size-adjust: none;
            font-size: 8px;
            font-weight: 400;
            font-family: 'Noto Sans', sans-serif;
            letter-spacing: 1px;
        }

        @keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        @-webkit-keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        @-moz-keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        @-o-keyframes shine {
            0% {
                background-position: 0;
            }
            60% {
                background-position: 180px;
            }
            100% {
                background-position: 180px;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                height: 80vh;
            }

            .glass-plate {
                padding: 30px 20px;
            }

            .welcome-text {
                font-size: 20px;
            }

            .back-button {
                width: 35px;
                height: 35px;
                font-size: 18px;
                top: 12px;
                left: 12px;
            }

            .brand-text {
                bottom: 10px;
            }

            .brand-name {
                font-size: 10px;
                padding: 6px 16px;
            }

            .brand-tagline {
                font-size: 7px;
            }

            .animated-btn {
                font-size: 14px;
                padding: 12px 30px;
                min-width: 180px;
            }

            .buttons-container {
                gap: 20px;
            }
        }
    </style>
</head>

        // Translate buttons based on selected language
        function translateButtons() {
            const howToUseSpan = document.querySelector('#howToUseBtn span');
            const shoppingMallSpan = document.querySelector('#shoppingMallBtn span');
            
            howToUseSpan.textContent = buttonTranslations.howToUse[selectedLang] || buttonTranslations.howToUse.en;
            shoppingMallSpan.textContent = buttonTranslations.shoppingMall[selectedLang] || buttonTranslations.shoppingMall.en;
        }

        // Translate store popup
        function translateStorePopup() {
            const storeTitle = document.getElementById('storeTitle');
            const koreanStoreText = document.getElementById('koreanStoreText');
            const localStoreText = document.getElementById('localStoreText');

            const titleText = buttonTranslations.selectStore[selectedLang] || buttonTranslations.selectStore.en;
            const koreanText = buttonTranslations.koreanStore[selectedLang] || buttonTranslations.koreanStore.en;
            const countryName = buttonTranslations.countryNames[selectedLang] || buttonTranslations.countryNames.en;
            const storeWord = buttonTranslations.countryStore[selectedLang] || buttonTranslations.countryStore.en;
            const localText = `${countryName} ${storeWord}`;

            storeTitle.textContent = titleText;
            koreanStoreText.textContent = koreanText;
            localStoreText.textContent = localText;
        }

        // Video Popup Controls
        const howToUseBtn = document.getElementById('howToUseBtn');
        const shoppingMallBtn = document.getElementById('shoppingMallBtn');
        const videoPopup = document.getElementById('videoPopup');
        const videoPlayer = document.getElementById('videoPlayer');
        const closeBtn = document.getElementById('closeBtn');

        // Open video popup
        howToUseBtn.addEventListener('click', (e) => {
            e.preventDefault();
            videoPopup.classList.add('active');
            videoPlayer.play();
        });

        // Close video popup (stays on page 3)
        closeBtn.addEventListener('click', () => {
            videoPopup.classList.remove('active');
            videoPlayer.pause();
            videoPlayer.currentTime = 0;
        });

        // Close on background click (stays on page 3)
        videoPopup.addEventListener('click', (e) => {
            if (e.target === videoPopup) {
                videoPopup.classList.remove('active');
                videoPlayer.pause();
                videoPlayer.currentTime = 0;
            }
        });

        // Close on Escape key (stays on page 3)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoPopup.classList.contains('active')) {
                videoPopup.classList.remove('active');
                videoPlayer.pause();
                videoPlayer.currentTime = 0;
            }
        });

        // Shopping Mall button - Show glass popup
        shoppingMallBtn.addEventListener('click', (e) => {
            e.preventDefault();
            
            const storePopup = document.getElementById('storePopup');
            translateStorePopup(); // Translate before showing
            storePopup.classList.add('active');
        });

        // Close store popup
        const storeCloseBtn = document.getElementById('storeCloseBtn');
        storeCloseBtn.addEventListener('click', () => {
            const storePopup = document.getElementById('storePopup');
            storePopup.classList.remove('active');
        });

        // Close store popup on background click
        const storePopup = document.getElementById('storePopup');
        storePopup.addEventListener('click', (e) => {
            if (e.target === storePopup) {
                storePopup.classList.remove('active');
            }
        });

        // Close store popup on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && storePopup.classList.contains('active')) {
                storePopup.classList.remove('active');
            }
        });

        // Korean Store button click
        document.getElementById('koreanStoreBtn').addEventListener('click', () => {
            // Add your Korean store link here
            alert('Korean Store - Coming Soon!');
        });

        // Local Store button click
        document.getElementById('localStoreBtn').addEventListener('click', () => {
            // Add your local store link here
            alert('Local Store - Coming Soon!');
        });
